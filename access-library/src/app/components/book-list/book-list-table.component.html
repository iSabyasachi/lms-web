<table class="table">

    <thead class="thead-dark">
        <tr>
            <th>Name</th>
            <th>ISBN</th>
        </tr>
    </thead>

    <tbody>
        <tr *ngFor="let tempBook of books">
            <td class="align-middle">{{ tempBook.title}}</td>
            <td class="align-middle">{{ tempBook.isbn}}</td>
        </tr>
    </tbody>
</table>
